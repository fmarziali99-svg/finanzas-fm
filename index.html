<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --w:#fff;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  --b50:#eff6ff;--b100:#dbeafe;--b500:#3b82f6;--b600:#2563eb;--b700:#1d4ed8;
  --gr50:#f0fdf4;--gr100:#dcfce7;--gr200:#bbf7d0;--gr500:#22c55e;--gr600:#16a34a;
  --r50:#fef2f2;--r100:#fee2e2;--r500:#ef4444;--r600:#dc2626;
  --y50:#fefce8;--y100:#fef9c3;--y500:#eab308;--y600:#ca8a04;
  --i50:#eef2ff;--i200:#c7d2fe;--i500:#6366f1;--i600:#4f46e5;--i700:#4338ca;
  --p50:#faf5ff;--p500:#a855f7;
  --f:'Inter',system-ui,sans-serif;--m:'JetBrains Mono',monospace;
  --nav:64px;--top:56px;
}
body{font-family:var(--f);color:var(--g900);background:var(--g50);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input,select,textarea,button{font-family:var(--f)}
button{cursor:pointer;border:none;background:none}
.topbar{position:fixed;top:0;left:0;right:0;z-index:50;height:var(--top);background:var(--w);border-bottom:1px solid var(--g100);display:flex;align-items:center;padding:0 16px;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#4f46e5,#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white}
.logo-name{font-size:15px;font-weight:700;color:var(--g900)}.logo-name span{color:var(--i600)}
.topbar-mid{flex:1;display:flex;justify-content:center}
.pc-nav{display:none;align-items:center;gap:2px}
.pcb{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--g500);transition:.15s}
.pcb:hover{background:var(--g100);color:var(--g800)}
.pcb.active{background:var(--i600);color:white}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.period-badge{background:var(--i50);color:var(--i600);border-radius:999px;padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--i200);white-space:nowrap}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g400)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--g300);flex-shrink:0;transition:background .3s}
.sync-dot.saving{background:var(--y500);animation:pulse 1s infinite}
.sync-dot.ok{background:var(--gr500)}
.sync-dot.err{background:var(--r500)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{padding:calc(var(--top) + 14px) 16px calc(var(--nav) + 20px);max-width:600px;margin:0 auto;width:100%}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;height:var(--nav);background:var(--w);border-top:1px solid var(--g100);display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.04);padding-bottom:env(safe-area-inset-bottom,0)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--g400);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;transition:.15s;position:relative}
.ni.active{color:var(--i600)}
.ni.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--i600);border-radius:0 0 2px 2px}
.ni-icon{font-size:19px;line-height:1}
.panel{display:none}.panel.active{display:block}
.fade{animation:fadeUp .18s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(--w);border-radius:18px;box-shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.04);padding:18px;margin-bottom:12px;border:1px solid var(--g100)}
.ct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--g400);margin-bottom:12px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero{border-radius:22px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero.ind{background:linear-gradient(135deg,#4338ca,#6366f1 55%,#818cf8);color:white;box-shadow:0 8px 24px rgba(67,56,202,.28)}
.hero.grn{background:linear-gradient(135deg,#047857,#10b981 60%,#34d399);color:white;box-shadow:0 8px 24px rgba(4,120,87,.22)}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,.07);border-radius:50%;pointer-events:none}
.hl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;opacity:.72;margin-bottom:3px}
.ha{font-family:var(--m);font-size:28px;font-weight:500;line-height:1;letter-spacing:-.4px}
.ha.xl{font-size:34px}
.hs{font-size:12px;opacity:.68;margin-top:2px}
.hchips{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.hchip{background:rgba(255,255,255,.14);border-radius:14px;padding:7px 10px;flex:1;min-width:80px;border:1px solid rgba(255,255,255,.16)}
.hcl{font-size:10px;opacity:.72;margin-bottom:1px;font-weight:500}
.hcv{font-family:var(--m);font-size:12px;font-weight:600}
.hdiv{height:1px;background:rgba(255,255,255,.15);margin:13px 0}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.hrow:last-child{border-bottom:none;padding-bottom:0}
.hrl{font-size:12px;opacity:.75}
.hrv{font-family:var(--m);font-size:13px;font-weight:600}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.metric{background:var(--w);border-radius:14px;padding:13px 14px;border:1px solid var(--g100);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ml{font-size:11px;color:var(--g400);font-weight:500;margin-bottom:3px}
.mv{font-family:var(--m);font-size:18px;font-weight:600;line-height:1.1}
.ms{font-size:11px;color:var(--g400);margin-top:2px}
.metric.grn{background:var(--gr50);border-color:var(--gr100)}.metric.grn .mv{color:var(--gr600)}
.metric.red{background:var(--r50);border-color:var(--r100)}.metric.red .mv{color:var(--r600)}
.metric.blu{background:var(--b50);border-color:var(--b100)}.metric.blu .mv{color:var(--b600)}
.metric.ind{background:var(--i50);border-color:var(--i200)}.metric.ind .mv{color:var(--i600)}
.metric.yel{background:var(--y50);border-color:var(--y100)}.metric.yel .mv{color:var(--y600)}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);margin-bottom:5px}
.fi,.fs,.ft{width:100%;background:var(--g50);border:1.5px solid var(--g200);border-radius:10px;color:var(--g900);padding:10px 13px;font-size:14px;font-family:var(--f);outline:none;transition:.15s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--i500);background:var(--w);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.fi.err,.fs.err{border-color:var(--r500);background:var(--r50)}
.ferr{font-size:11px;color:var(--r600);margin-top:3px;font-weight:500;display:none}
.ferr.show{display:block}
.ft{resize:none;height:64px;line-height:1.5}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--f);transition:all .15s;white-space:nowrap}
.btn-p{background:var(--i600);color:white;box-shadow:0 3px 10px rgba(79,70,229,.22)}
.btn-p:hover{background:var(--i700)}.btn-p:active{transform:scale(.97)}
.btn-s{background:var(--w);color:var(--g700);border:1.5px solid var(--g200)}
.btn-s:hover{background:var(--g50)}
.btn-d{background:var(--r50);color:var(--r600);border:1px solid var(--r100)}
.btn-gh{background:transparent;color:var(--g500);font-size:13px;padding:6px 11px}
.btn-fw{width:100%}
.brow{display:flex;gap:8px;margin-top:14px}
.btn-sm{padding:6px 12px;font-size:12px}
.bic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:none}
.bic.ed{background:var(--b50);color:var(--b600)}.bic.dl{background:var(--r50);color:var(--r500)}
/* ── ESTADO PAGO ── */
.pay-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid;transition:.15s;white-space:nowrap}
.pay-btn.paid{background:var(--gr50);color:var(--gr600);border-color:var(--gr200)}
.pay-btn.unpaid{background:var(--y50);color:var(--y600);border-color:var(--y100)}
.pay-btn:hover{filter:brightness(.94)}
.cat-pay-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid;transition:.15s}
.cat-pay-btn.paid{background:var(--gr50);color:var(--gr600);border-color:var(--gr200)}
.cat-pay-btn.unpaid{background:var(--y50);color:var(--y600);border-color:var(--y100)}
.litem.paid-item{opacity:.65}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.bg-gr{background:var(--gr50);color:var(--gr600);border:1px solid var(--gr100)}
.bg-re{background:var(--r50);color:var(--r600);border:1px solid var(--r100)}
.bg-bl{background:var(--b50);color:var(--b600);border:1px solid var(--b100)}
.bg-in{background:var(--i50);color:var(--i600);border:1px solid var(--i200)}
.bg-gy{background:var(--g100);color:var(--g600);border:1px solid var(--g200)}
.bg-ye{background:var(--y50);color:var(--y600);border:1px solid var(--y100)}
.tabs{display:flex;background:var(--g100);border-radius:14px;padding:3px;margin-bottom:14px;gap:2px}
.tab{flex:1;padding:7px;border-radius:10px;font-size:12px;font-weight:600;color:var(--g500);text-align:center;transition:.15s}
.tab.active{background:var(--w);color:var(--g900);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mpills{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:13px;scrollbar-width:none}
.mpills::-webkit-scrollbar{display:none}
.mpill{padding:5px 13px;border-radius:999px;font-size:12px;font-weight:600;color:var(--g500);background:var(--w);border:1.5px solid var(--g200);white-space:nowrap;flex-shrink:0;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mpill.active{background:var(--i600);color:white;border-color:var(--i600)}
.litem{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--g100)}
.litem:last-child{border-bottom:none}
.litem-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.litem-body{flex:1;min-width:0}
.litem-name{font-size:13px;font-weight:500;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.litem-meta{font-size:11px;color:var(--g400);margin-top:1px}
.litem-right{text-align:right;flex-shrink:0}
.lamt{font-family:var(--m);font-size:13px;font-weight:600}
.lact{display:flex;gap:4px;align-items:center;flex-shrink:0}
.catrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--g100);cursor:pointer}
.catrow:last-child{border-bottom:none}
.catic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.catbody{flex:1;min-width:0}
.catname{font-size:13px;font-weight:600;color:var(--g800)}
.catbar{height:3px;background:var(--g100);border-radius:2px;margin-top:5px;overflow:hidden}
.catfill{height:100%;border-radius:2px;transition:width .4s ease}
.pw{margin-bottom:9px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--g500);margin-bottom:4px;font-weight:500}
.pt{height:6px;background:var(--g100);border-radius:999px;overflow:hidden}
.pf{height:100%;border-radius:999px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pf.gr{background:linear-gradient(90deg,#16a34a,#22c55e)}
.pf.ye{background:linear-gradient(90deg,#ca8a04,#eab308)}
.pf.re{background:linear-gradient(90deg,#dc2626,#ef4444)}
.pf.in{background:linear-gradient(90deg,#4f46e5,#818cf8)}
.pf.bl{background:linear-gradient(90deg,#2563eb,#60a5fa)}
.alert{border-radius:14px;padding:11px 14px;margin-bottom:11px;font-size:13px;line-height:1.5;border:1px solid;display:flex;gap:9px;align-items:flex-start}
.al-i{background:var(--b50);border-color:var(--b100);color:#1e40af}
.al-s{background:var(--gr50);border-color:var(--gr100);color:var(--gr600)}
.al-w{background:var(--y50);border-color:var(--y100);color:var(--y600)}
.al-d{background:var(--r50);border-color:var(--r100);color:var(--r600)}
.al-n{background:var(--g50);border-color:var(--g200);color:var(--g600)}
.tc-banner{background:var(--y50);border:1px solid var(--y100);border-radius:14px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;color:var(--y600);flex-wrap:wrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s ease}
.overlay.open{opacity:1;pointer-events:all}
.msheet{background:var(--w);border-radius:20px 20px 0 0;padding:0 20px 36px;width:100%;max-width:600px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto;box-shadow:0 -8px 30px rgba(0,0,0,.13)}
.overlay.open .msheet{transform:translateY(0)}
.mhandle{width:34px;height:4px;background:var(--g200);border-radius:999px;margin:11px auto 18px}
.mtitle{font-size:16px;font-weight:700;margin-bottom:18px;text-align:center}
.chwrap{position:relative;height:220px;margin:0 -4px}
#coin-cel{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:9999;pointer-events:none}
.coin{width:68px;height:68px;border-radius:50%;background:linear-gradient(145deg,#fde68a,#f59e0b);border:3px solid #fbbf24;box-shadow:0 10px 28px rgba(245,158,11,.35);display:grid;place-items:center;font-size:34px;animation:coinAnim 1250ms ease-out forwards}
@keyframes coinAnim{0%{opacity:0;transform:translateY(18px) scale(.6)}20%{opacity:1;transform:translateY(0) scale(1.1)}45%{transform:translateY(-12px) scale(1)}100%{opacity:0;transform:translateY(-36px) scale(.88)}}
@media(prefers-reduced-motion:reduce){.coin{animation:coinFade 700ms forwards}@keyframes coinFade{from{opacity:1}to{opacity:0}}}
.cmths{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px}
.cmth{padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;border:1px solid}
.divider{height:1px;background:var(--g100);margin:12px 0}
.empty{text-align:center;padding:28px 16px}
.empty-ic{font-size:36px;margin-bottom:8px;opacity:.45}
.empty-ti{font-size:14px;font-weight:600;color:var(--g500);margin-bottom:3px}
.empty-su{font-size:12px;color:var(--g400)}
.text-gr{color:var(--gr600)}.text-re{color:var(--r600)}.text-in{color:var(--i600)}.text-mu{color:var(--g400)}
.mono{font-family:var(--m)}
.hidden{display:none!important}
.swrap{position:relative;margin-bottom:11px}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--g400);pointer-events:none}
.sfi{width:100%;background:var(--w);border:1.5px solid var(--g200);border-radius:14px;padding:9px 13px 9px 35px;font-size:14px;outline:none;transition:.15s;font-family:var(--f)}
.sfi:focus{border-color:var(--i500);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
@media(min-width:640px){
  :root{--nav:0px;--top:60px}
  body{background:var(--g100)}
  .main{padding:calc(var(--top) + 24px) 24px 36px;max-width:680px}
  .bnav{display:none!important}
  .topbar{padding:0 28px}
  .topbar-mid .pc-nav{display:flex}
  .ha.xl{font-size:38px}
  .metrics{grid-template-columns:repeat(4,1fr)}
  .fgrid{grid-template-columns:1fr 1fr}
  .overlay{align-items:center;padding:20px}
  .msheet{border-radius:20px;max-width:500px;transform:translateY(14px) scale(.97);opacity:0;transition:transform .22s ease,opacity .22s ease;max-height:85vh}
  .overlay.open .msheet{transform:none;opacity:1}
  #coin-cel{bottom:40px}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo"><div class="logo-mark">FM</div><div class="logo-name">FM <span>Capital</span></div></div>
  <div class="topbar-mid">
    <nav class="pc-nav" id="pc-nav">
      <button class="pcb active" data-p="inicio" onclick="Nav.go('inicio',true)" aria-label="Inicio">🏠 Inicio</button>
      <button class="pcb" data-p="gastos" onclick="Nav.go('gastos',true)" aria-label="Gastos">💸 Gastos</button>
      <button class="pcb" data-p="ahorro" onclick="Nav.go('ahorro',true)" aria-label="Ahorro">💵 Ahorro</button>
      <button class="pcb" data-p="config" onclick="Nav.go('config',true)" aria-label="Config">⚙️ Config</button>
    </nav>
  </div>
  <div class="topbar-right">
    <button class="period-badge" id="period-badge" onclick="showPeriodPicker()" aria-label="Cambiar período">Jun 2026</button>
    <div class="sync-wrap" id="sync-wrap" title="Estado de sincronización" style="cursor:pointer" onclick="Cloud.forceSync()">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-lbl" style="font-size:10px;color:var(--g400);display:none"></span>
  </div>
  </div>
</header>
<main class="main">
  <div id="panel-inicio" class="panel active fade"><div id="ct-inicio"></div></div>
  <div id="panel-gastos" class="panel fade">
    <div class="tabs" id="g-tabs">
      <button class="tab active" onclick="GUI.tab('nuevo')">+ Nuevo</button>
      <button class="tab" onclick="GUI.tab('cuotas')">Cuotas</button>
      <button class="tab" onclick="GUI.tab('lista')">Historial</button>
    </div>
    <div id="g-nuevo"></div>
    <div id="g-cuotas" class="hidden"></div>
    <div id="g-lista" class="hidden"></div>
  </div>
  <div id="panel-ahorro" class="panel fade"><div id="ct-ahorro"></div></div>
  <div id="panel-config" class="panel fade"><div id="ct-config"></div></div>
</main>
<nav class="bnav">

<script>
'use strict';
// ── CONSTANTES ──
const SCHEMA_V=3, LS_KEY='fmcap2', SAVE_DELAY=800;
const INGRESO_DEF=2350000, USD_META=10000, TC_DEF=1420;
const PLAN_START='2026-06', PLAN_END='2026-12';
const CATS_DEF=[
  {id:'monotributo',nombre:'Monotributo + IIBB',icon:'🏛️',color:'#6366f1',bg:'#eef2ff',monto:114000,activa:true,orden:0},
  {id:'visa',       nombre:'Tarjeta Visa cuotas',icon:'💳',color:'#3b82f6',bg:'#eff6ff',monto:218869,activa:true,orden:1},
  {id:'master',     nombre:'Tarjeta Mastercard', icon:'💳',color:'#8b5cf6',bg:'#faf5ff',monto:47033, activa:true,orden:2},
  {id:'gimnasio',   nombre:'Gimnasio',           icon:'🏋️',color:'#22c55e',bg:'#f0fdf4',monto:135000,activa:true,orden:3},
  {id:'claude',     nombre:'Suscripción Claude', icon:'🤖',color:'#a855f7',bg:'#faf5ff',monto:28400, activa:true,orden:4},
  {id:'debin',      nombre:'DEBIN / Mercado Pago',icon:'📲',color:'#f59e0b',bg:'#fffbeb',monto:250000,activa:true,orden:5,isDebin:true},
  {id:'varios',     nombre:'Varios',             icon:'📦',color:'#6b7280',bg:'#f9fafb',monto:0,     activa:true,orden:6},
];

// ── STATE ──
let S={schemaVersion:SCHEMA_V,periodoActual:'2026-06',periodos:{},ahorros:[],
       tcActual:TC_DEF,tcFecha:null,tcHistorial:[],
       usdInicial:3000,usdInicialTc:null,usdInicialArs:null,
       debinLimiteMes:250000,presupuestos:{},snapshots:{},
       pagosCats:{}}; // {pid: {catId: true/false}} — estado de pago de gastos fijos por categoría

// ── PERIODO HELPERS ──
function pLabel(pid){if(!pid)return '—';const[y,m]=pid.split('-');const n=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];return n[(+m||1)-1]+' '+y;}
function pCorto(pid){if(!pid)return '—';const[y,m]=pid.split('-');const c=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return c[(+m||1)-1]+' '+y.slice(2);}
function pCortoMes(pid){return pCorto(pid).split(' ')[0];}
function pFromDate(f){return f?f.slice(0,7):null;}
function pStart(pid){return pid?pid+'-01':null;}
function pContains(pid,f){return f?f.slice(0,7)===pid:false;}
function pNext(pid){const[y,m]=pid.split('-').map(Number);const nm=m===12?1:m+1,ny=m===12?y+1:y;return ny+'-'+(nm<10?'0'+nm:''+nm);}
function pPrev(pid){const[y,m]=pid.split('-').map(Number);const pm=m===1?12:m-1,py=m===1?y-1:y;return py+'-'+(pm<10?'0'+pm:''+pm);}
function pDefDate(pid){const h=localToday();return pContains(pid,h)?h:pStart(pid);}
function inPlan(pid){return pid>=PLAN_START&&pid<=PLAN_END;}

// ── UTILS ──
function localToday(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function fmtDate(iso){if(!iso)return '—';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function esc(v){return String(v==null?'':''+v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');}
function uid(p){try{return p+'_'+crypto.randomUUID();}catch(e){return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2);}}
const fmt=n=>new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);
const fmtK=n=>{n=n||0;const a=Math.abs(n),s=n<0?'-':'';return a>=1e6?s+'$'+(a/1e6).toFixed(1)+'M':a>=1000?s+'$'+(a/1000).toFixed(0)+'k':fmt(n);};
const fmtUSD=n=>'USD '+(+n||0).toLocaleString('es-AR');
// HTML builder - nunca usa comillas simples para atributos
function el(tag,attrs,inner){
  var a='';
  for(var k in attrs){if(attrs[k]!=null&&attrs[k]!==false)a+=' '+k+'="'+String(attrs[k]).replaceAll('"','&quot;')+'"';}
  if(inner==null)return '<'+tag+a+'>';
  return '<'+tag+a+'>'+inner+'</'+tag+'>';
}
function div(cls,inner,attrs){var a=attrs||{};a.class=cls;return el('div',a,inner);}
function span(cls,inner){return el('span',{class:cls},inner);}
function btn(cls,inner,onclick,extra){var a=extra||{};a.class=cls;a.onclick=onclick;return el('button',a,inner);}

// ── PARSEO MONTOS ──
function parseAR(v){const r=String(v==null?'':''+v).trim().replace(/\s/g,'').replace(/\$/g,'').replace(/\./g,'').replace(',','.');if(!r)return null;const n=Number(r);return Number.isFinite(n)?n:null;}
function validarAR(v,campo,opts){const n=parseAR(v);if(n===null)return campo+': ingresá un número válido';if(n<0)return campo+': no puede ser negativo';if(!(opts&&opts.allowZero)&&n===0)return campo+': debe ser mayor a cero';if(n>50000000)return campo+': valor demasiado alto';return null;}
function showErr(id,msg){const e=document.getElementById(id);if(!e)return;if(msg){e.textContent=msg;e.classList.add('show');const f=e.previousElementSibling;if(f)f.classList.add('err');}else{e.textContent='';e.classList.remove('show');const f=e.previousElementSibling;if(f)f.classList.remove('err');}}

// ── MIGRACIÓN ──
const LEGACY={'junio_2026':'2026-06','julio_2026':'2026-07','agosto_2026':'2026-08','septiembre_2026':'2026-09','octubre_2026':'2026-10','noviembre_2026':'2026-11','diciembre_2026':'2026-12'};
function migrate(raw){
  if(!raw)return;
  if(raw.periodoActual&&LEGACY[raw.periodoActual])raw.periodoActual=LEGACY[raw.periodoActual];
  if(raw.periodos){Object.keys(LEGACY).forEach(o=>{if(raw.periodos[o]){raw.periodos[LEGACY[o]]=raw.periodos[o];delete raw.periodos[o];}});
    Object.values(raw.periodos).forEach(per=>{(per.cuotas||[]).forEach(c=>{if(c.desde&&LEGACY[c.desde])c.desde=LEGACY[c.desde];});});}
  // Inicializar campos nuevos si no existen (compatibilidad hacia adelante)
  if(!raw.presupuestos) raw.presupuestos={};
  if(!raw.snapshots)    raw.snapshots={};
  if(!raw.pagosCats)    raw.pagosCats={};
  if(!raw.tcHistorial)  raw.tcHistorial=[];
  if(!raw.ahorros)      raw.ahorros=[];
  if(raw.usdInicial===undefined) raw.usdInicial=3000;
  if(!raw.debinLimiteMes) raw.debinLimiteMes=250000;
  raw.schemaVersion=SCHEMA_V;
}

// ── CLOUD ──
// ── SERIALIZACIÓN SEGURA DEL STATE ───────────────────
// Extrae SOLO los campos conocidos de S para evitar DataCloneError
// cuando objetos externos (Supabase client, Chart.js) contaminan el scope
function cloneState(){
  try{
    // Intentar serialización completa primero (caso ideal)
    return JSON.parse(JSON.stringify({
      schemaVersion: S.schemaVersion,
      periodoActual: S.periodoActual,
      periodos:      S.periodos,
      ahorros:       S.ahorros,
      tcActual:      S.tcActual,
      tcFecha:       S.tcFecha,
      tcHistorial:   S.tcHistorial,
      usdInicial:    S.usdInicial,
      usdInicialTc:  S.usdInicialTc,
      usdInicialArs: S.usdInicialArs,
      debinLimiteMes:S.debinLimiteMes,
      presupuestos:  S.presupuestos,
      snapshots:     S.snapshots,
      pagosCats:     S.pagosCats
    }));
  }catch(e){
    // Fallback: construir manualmente campo a campo
    console.warn('[cloneState] JSON.stringify falló, usando fallback:', e.message);
    var safe={
      schemaVersion: S.schemaVersion||3,
      periodoActual: String(S.periodoActual||'2026-06'),
      periodos:      {},
      ahorros:       [],
      tcActual:      +(S.tcActual||1420),
      tcFecha:       S.tcFecha||null,
      tcHistorial:   [],
      usdInicial:    +(S.usdInicial||3000),
      usdInicialTc:  S.usdInicialTc||null,
      usdInicialArs: S.usdInicialArs||null,
      debinLimiteMes:+(S.debinLimiteMes||250000),
      presupuestos:  {},
      snapshots:     {},
      pagosCats:     {}
    };
    // Copiar periodos de forma segura
    try{
      Object.keys(S.periodos||{}).forEach(function(pid){
        var per=S.periodos[pid];
        safe.periodos[pid]={
          ingreso:+(per.ingreso||0),
          categorias:(per.categorias||[]).map(function(c){
            return{id:String(c.id||''),nombre:String(c.nombre||''),icon:String(c.icon||''),
                   color:String(c.color||''),bg:String(c.bg||''),monto:+(c.monto||0),
                   activa:!!c.activa,orden:+(c.orden||0),isDebin:!!c.isDebin};
          }),
          gastos:(per.gastos||[]).map(function(g){
            return{id:String(g.id||''),fecha:String(g.fecha||''),catId:String(g.catId||''),
                   importe:+(g.importe||0),desc:String(g.desc||''),obs:String(g.obs||''),
                   isPaid:!!g.isPaid};
          }),
          cuotas:(per.cuotas||[]).map(function(q){
            return{id:String(q.id||''),desc:String(q.desc||''),catId:String(q.catId||''),
                   total:+(q.total||0),n:+(q.n||0),cuotaVal:+(q.cuotaVal||0),
                   cuotaPrimera:+(q.cuotaPrimera||0),desde:String(q.desde||''),
                   alta:String(q.alta||'')};
          })
        };
      });
    }catch(e2){console.warn('[cloneState.periodos]',e2.message);}
    // Copiar ahorros
    try{
      safe.ahorros=(S.ahorros||[]).map(function(a){
        return{id:String(a.id||''),fecha:String(a.fecha||''),
               usd:+(a.usd||0),tc:+(a.tc||0),ars:+(a.ars||0)};
      });
    }catch(e2){}
    // Copiar historial TC
    try{
      safe.tcHistorial=(S.tcHistorial||[]).map(function(h){
        return{tc:+(h.tc||0),fecha:String(h.fecha||''),hora:String(h.hora||'')};
      });
    }catch(e2){}
    // Copiar presupuestos, snapshots, pagosCats
    try{safe.presupuestos=JSON.parse(JSON.stringify(S.presupuestos||{}));}catch(e2){}
    try{safe.pagosCats=JSON.parse(JSON.stringify(S.pagosCats||{}));}catch(e2){}
    try{safe.snapshots=JSON.parse(JSON.stringify(S.snapshots||{}));}catch(e2){}
    return safe;
  }
}

// ── PERSISTENCIA ──────────────────────────────────────
// Estrategia:
//   WRITE: localStorage INMEDIATO + Supabase con debounce 800ms
//          El snapshot para Supabase se toma AL MOMENTO del flush,
//          no al momento del save() — así siempre sube el estado más reciente.
//   READ:  Supabase primero; si falla o está vacío, localStorage.
//          Resolver conflictos por clientUpdatedAt: gana el más reciente.
// ──────────────────────────────────────────────────────
const Cloud=(()=>{
  let _sb=null, _flushTimer=null, _pendingFlush=false, _saving=false;

  function sb(){
    if(!_sb){
      var u=window.FM_SB_URL, k=window.FM_SB_ANON;
      // Deshabilitar si URL vacía, placeholder o inválida
      if(!u||!k||u===''||k===''||u.indexOf('TU_')>=0||u.indexOf('xxxxx')>=0)return null;
      try{_sb=window.supabase.createClient(u,k);}
      catch(e){console.warn('[Supabase] Error al crear cliente:',e.message);return null;}
    }
    return _sb;
  }

  function dot(s){
    var d=document.getElementById('sync-dot');
    var lbl=document.getElementById('sync-lbl');
    if(!d)return;
    d.className='sync-dot '+(s==='saving'?'saving':s==='ok'?'ok':s==='err'?'err':'');
    var labels={saving:'Guardando...',ok:'Guardado',err:'Solo local','':{}} ;
    if(lbl){
      if(s==='err'){
        // Si no hay Supabase configurado, mostrar gris neutro (no rojo alarmante)
        var sinSB=(!window.FM_SB_URL||window.FM_SB_URL==='');
        lbl.textContent=sinSB?'Local':'Solo local';
        lbl.style.display='inline';
        lbl.style.color=sinSB?'var(--g400)':'var(--r500)';
        setTimeout(function(){lbl.style.display='none';},sinSB?2000:4000);
      } else if(s==='saving'){
        lbl.textContent='Guardando';lbl.style.display='inline';lbl.style.color='var(--y600)';
      } else if(s==='ok'){
        lbl.textContent='Guardado';lbl.style.display='inline';lbl.style.color='var(--gr600)';
        setTimeout(function(){lbl.style.display='none';d.className='sync-dot';},2500);
      } else {
        lbl.style.display='none';
      }
    }
  }

  // Escribe en localStorage inmediatamente (síncrono, nunca falla silenciosamente)
  function saveLocal(data){
    try{
      localStorage.setItem(LS_KEY, JSON.stringify(data));
      return true;
    }catch(e){
      console.error('[Cloud.saveLocal]', e);
      return false;
    }
  }

  // Flush a Supabase — siempre usa el estado ACTUAL de S, no el del momento del save()
  async function flushToSupabase(){
    if(_saving)return; // no solapar requests
    var s=sb();
    if(!s){dot('err');return;}
    _saving=true;
    dot('saving');
    // Snapshot del estado actual al momento del flush — usando cloneState() seguro
    var payload=cloneState();
    payload.clientUpdatedAt=new Date().toISOString();
    // Guardar también en localStorage con el timestamp actualizado
    saveLocal(payload);
    try{
      var resp=await s.from('fm_state').upsert(
        {user_key:'default', data:payload, updated_at:new Date().toISOString()},
        {onConflict:'user_key'}
      );
      if(resp.error)throw resp.error;
      dot('ok');
      setTimeout(function(){dot('');}, 2500);
    }catch(e){
      dot('err');
      console.warn('[Cloud.flush]', e.message);
      // No pierde datos — ya está en localStorage
    }finally{
      _saving=false;
      // Si hubo cambios durante el flush, programar otro
      if(_pendingFlush){_pendingFlush=false;scheduleFlush();}
    }
  }

  function scheduleFlush(){
    if(_saving){_pendingFlush=true;return;}
    clearTimeout(_flushTimer);
    _flushTimer=setTimeout(flushToSupabase, SAVE_DELAY);
  }

  return{
    // save() — llamar después de cada mutación del STATE
    save:function(data){
      // 1. localStorage INMEDIATO con timestamp — cloneState() evita DataCloneError
      var payload=cloneState();
      payload.clientUpdatedAt=new Date().toISOString();
      saveLocal(payload);
      // 2. Supabase con debounce
      scheduleFlush();
    },

    // saveNow() — para operaciones críticas, no espera el debounce
    saveNow:async function(data){
      var payload=cloneState();
      payload.clientUpdatedAt=new Date().toISOString();
      saveLocal(payload);
      clearTimeout(_flushTimer);
      await flushToSupabase();
    },

    async load(){
      var localData=null, remoteData=null;

      // Cargar localStorage
      try{
        var raw=localStorage.getItem(LS_KEY);
        if(raw){localData=JSON.parse(raw);}
      }catch(e){console.warn('[Cloud.load.local]',e);}

      // Cargar Supabase
      var s=sb();
      if(s){
        try{
          var resp=await s.from('fm_state').select('data,updated_at').eq('user_key','default').single();
          if(!resp.error && resp.data && resp.data.data && Object.keys(resp.data.data).length>0){
            remoteData=resp.data.data;
          }
        }catch(e){console.warn('[Cloud.load.remote]',e.message);}
      }

      // Resolver conflicto: usar el más reciente por clientUpdatedAt
      var winner=null;
      if(remoteData && localData){
        var remoteTs=remoteData.clientUpdatedAt||remoteData.updated_at||'';
        var localTs=localData.clientUpdatedAt||'';
        winner = remoteTs >= localTs ? remoteData : localData;
        if(localTs > remoteTs){
          // Local es más reciente → re-subir a Supabase
          console.log('[Cloud.load] Local más reciente, re-subiendo a Supabase...');
          migrate(localData);
          Object.assign(S, localData);
          await flushToSupabase();
          return;
        }
      } else if(remoteData){
        winner=remoteData;
      } else if(localData){
        winner=localData;
      }

      if(winner && Object.keys(winner).length>0){
        migrate(winner);
        // Merge profundo selectivo: winner gana en todo excepto
        // pagosCats y presupuestos donde hacemos merge por clave
        // (para no perder estados de pago hechos offline)
        var oldPagos=S.pagosCats||{};
        var oldPres=S.presupuestos||{};
        Object.assign(S, winner);
        // Mergear pagosCats: unir claves (local + remote)
        S.pagosCats=Object.assign({}, oldPagos, winner.pagosCats||{});
        S.presupuestos=Object.assign({}, oldPres, winner.presupuestos||{});
        // Asegurar campos obligatorios
        if(!S.periodos)   S.periodos={};
        if(!S.ahorros)    S.ahorros=[];
        if(!S.tcHistorial)S.tcHistorial=[];
        if(!S.snapshots)  S.snapshots={};
        // Persistir resultado final
        saveLocal(cloneState());
      }
    },

    // Forzar flush manual (debug)
    forceSync:async function(){
      clearTimeout(_flushTimer);
      await flushToSupabase();
    }
  };
})();

// save() global — siempre usar esta función después de mutar S
function save(){
  Cloud.save(S); // cloneState() se encarga de la serialización segura
}
// saveNow() — para operaciones donde el usuario espera confirmación
async function saveNow(){
  await Cloud.saveNow(S); // cloneState() se encarga de la serialización segura
}

// ── PERIODO DATA ──
function getPeriodo(pid){
  pid=pid||S.periodoActual;
  if(!S.periodos[pid]){
    var cats=CATS_DEF.map(function(c){return Object.assign({},c);});
    var ant=pPrev(pid);
    if(ant&&S.periodos[ant])cats=S.periodos[ant].categorias.map(function(c){return Object.assign({},c);});
    S.periodos[pid]={ingreso:INGRESO_DEF,categorias:cats,gastos:[],cuotas:[]};
  }
  return S.periodos[pid];
}
// Versión read-only: devuelve el periodo si existe, sino un objeto vacío seguro SIN crearlo
function getPeriodoRO(pid){
  return S.periodos[pid]||{ingreso:INGRESO_DEF,categorias:[],gastos:[],cuotas:[]};
}
function getCats(pid){return getPeriodo(pid).categorias||[];}
function getGastos(pid){return getPeriodo(pid).gastos||[];}
function getIngreso(pid){return (S.periodos[pid]&&S.periodos[pid].ingreso)||INGRESO_DEF;}
function getPres(pid,catId){return (S.presupuestos[pid]&&S.presupuestos[pid][catId])||0;}
function setPres(pid,catId,v){if(!S.presupuestos[pid])S.presupuestos[pid]={};S.presupuestos[pid][catId]=v;}
// Estado de pago: gastos fijos (por categoría) y gastos variables (por ID de gasto)
// isPaid se guarda en pagosCats[pid][catId] para fijos
// y en el propio objeto gasto.isPaid para variables
function getCatPaid(pid,catId){return !!(S.pagosCats&&S.pagosCats[pid]&&S.pagosCats[pid][catId]);}
function setCatPaid(pid,catId,val){
  if(!S.pagosCats)S.pagosCats={};
  if(!S.pagosCats[pid])S.pagosCats[pid]={};
  S.pagosCats[pid][catId]=!!val;
  save();
}
function toggleCatPaid(pid,catId){setCatPaid(pid,catId,!getCatPaid(pid,catId));}
function toggleGastoPaid(id,pid){
  var per=getPeriodo(pid);
  var g=(per.gastos||[]).find(function(x){return x.id===id;});
  if(g){g.isPaid=!g.isPaid;save();}
}
function esCerrado(pid){return !!(S.snapshots&&S.snapshots[pid]);}
function getSnapshot(pid){return S.snapshots&&S.snapshots[pid];}

function cuotasActivasMes(pid,catId){
  var all=[];
  Object.values(S.periodos).forEach(function(per){(per.cuotas||[]).forEach(function(c){all.push(c);});});
  var py=parseInt(pid.split('-')[0]),pm=parseInt(pid.split('-')[1]);
  var total=0;
  all.forEach(function(c){
    if(catId&&c.catId!==catId)return;
    if(!c.desde)return;
    var dy=parseInt(c.desde.split('-')[0]),dm=parseInt(c.desde.split('-')[1]);
    var diff=(py-dy)*12+(pm-dm);
    if(diff<0||diff>=(+c.n||1))return;
    total+=diff===0?((+c.cuotaPrimera)||(+c.cuotaVal)||0):(+c.cuotaVal||0);
  });
  return total;
}
function totalCat(pid,catId){
  var per=S.periodos[pid]||getPeriodo(pid);
  var cat=(per.categorias||[]).find(function(c){return c.id===catId;});
  var base=cat?(+cat.monto||0):0;
  var gastos=(per.gastos||[]).filter(function(g){return g.catId===catId;}).reduce(function(a,g){return a+(+g.importe||0);},0);
  return base+gastos+cuotasActivasMes(pid,catId);
}
function totalGastos(pid){
  // Si el periodo no existe, no crearlo — devolver 0
  if(!S.periodos[pid])return 0;
  return getCats(pid).filter(function(c){return c.activa;}).reduce(function(a,c){return a+totalCat(pid,c.id);},0);
}
function totalDebinMes(pid){return getCats(pid).filter(function(c){return c.isDebin&&c.activa;}).reduce(function(a,c){return a+totalCat(pid,c.id);},0);}
function totalUSD(){return (S.usdInicial||0)+S.ahorros.reduce(function(a,h){return a+(+h.usd||0);},0);}
function invHistorica(){var t=0;if(S.usdInicialArs)t+=S.usdInicialArs;return t+S.ahorros.reduce(function(a,h){return a+(+h.ars||0);},0);}
function valorActual(){return totalUSD()*(S.tcActual||TC_DEF);}
function gananciaLatente(){return invHistorica()>0?valorActual()-invHistorica():null;}
function rentabilidad(){var inv=invHistorica();return(inv>0&&gananciaLatente()!==null)?(gananciaLatente()/inv)*100:null;}

function cerrarMes(pid){
  if(!S.snapshots)S.snapshots={};
  var per=getPeriodo(pid);
  S.snapshots[pid]={cerradoEn:new Date().toISOString(),ingreso:getIngreso(pid),gastos:totalGastos(pid),
    cats:getCats(pid).filter(function(c){return c.activa;}).map(function(c){return{id:c.id,nombre:c.nombre,total:totalCat(pid,c.id)};}),
    gastosLista:JSON.parse(JSON.stringify(per.gastos||[]))};
  Cloud.saveNow(S).catch(function(e){save();});
}
function reabrirMes(pid){if(S.snapshots)delete S.snapshots[pid];save();}

// ── NAV ──
const Nav={
  go:function(name,scroll){
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
    document.querySelectorAll('.ni,.pcb').forEach(function(b){b.classList.remove('active');});
    var p=document.getElementById('panel-'+name);
    if(p){p.classList.add('active');p.classList.remove('fade');void p.offsetWidth;p.classList.add('fade');}
    document.querySelectorAll('[data-p="'+name+'"]').forEach(function(b){b.classList.add('active');});
    if(scroll)window.scrollTo({top:0,behavior:'smooth'});
    Nav.current=name;
    if(Render[name])Render[name]();
  },
  current:'inicio'
};

    var resto=ingreso-gastos-ahorroMesARS;
    var pct=ingreso>0?Math.min((gastos/ingreso)*100,100):0;
    // Por día: depende del período seleccionado
    var hoy=new Date();
    var pidActual=pFromDate(localToday());
    var dRest=0, porDia=0, mostrarPorDia=false;
    if(pid===pidActual){
      // Mes actual: días restantes reales
      var dMes=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).getDate();
      dRest=Math.max(dMes-hoy.getDate(),1);
      mostrarPorDia=true;
      porDia=resto>0?Math.floor(resto/dRest):0;
    } else if(pid>pidActual){
      // Mes futuro: todos los días del mes
      var parts=pid.split('-');
      dRest=new Date(+parts[0],+parts[1],0).getDate();
      mostrarPorDia=true;
      porDia=resto>0?Math.floor(resto/dRest):0;
    }
    // Mes pasado/cerrado: no mostrar "por día"
    var debinUsado=cerrado&&snap?0:totalDebinMes(pid);
    var debinLim=S.debinLimiteMes||250000;
    var debinPct=(debinUsado/debinLim)*100;
    var usdPct=Math.round((usdTotal/USD_META)*100);
    var gan=gananciaLatente();
    var rent=rentabilidad();
    var cats= cerrado && snap
      ? snap.cats.map(function(sc){return getCats(pid).find(function(c){return c.id===sc.id;})||{id:sc.id,nombre:sc.nombre,icon:'📦',color:'#6b7280',bg:'#f9fafb',activa:true,orden:0};})
      : getCats(pid).filter(function(c){return c.activa;}).sort(function(a,b){return a.orden-b.orden;});

    // Hero chips
    var restoColor=resto<0?'#fca5a5':'#bbf7d0';
    var chipsHTML='<div class="hchips">'+
      '<div class="hchip"><div class="hcl">Gastos fijos</div><div class="hcv">'+fmtK(gastos)+'</div></div>'+
      '<div class="hchip"><div class="hcl">Valor USD</div><div class="hcv">'+fmtK(valUSD)+'</div></div>'+
      '<div class="hchip" style="border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.2)">'+
        '<div class="hcl">Disponible</div><div class="hcv" style="color:'+restoColor+'">'+fmtK(resto)+'</div>'+
      '</div></div>';

    // USD stats
    var usdStatsHTML='';
    if(gan!==null){
      var ganColor=gan>=0?'#bbf7d0':'#fca5a5';
      var rentColor=(rent||0)>=0?'#bbf7d0':'#fca5a5';
      usdStatsHTML=
        '<div class="hrow"><div class="hrl">Valor actual ('+fmt(S.tcActual)+'/USD)</div><div class="hrv">'+fmt(valUSD)+'</div></div>'+
        '<div class="hrow"><div class="hrl">Inversión histórica</div><div class="hrv">'+fmt(invHistorica())+'</div></div>'+
        '<div class="hrow"><div class="hrl">Ganancia latente</div><div class="hrv" style="color:'+ganColor+'">'+(gan>=0?'+':'')+fmt(gan)+'</div></div>'+
        '<div class="hrow"><div class="hrl">Rentabilidad</div><div class="hrv" style="color:'+rentColor+'">'+(rent>=0?'+':'')+(rent||0).toFixed(2)+'%</div></div>';
    } else {
      usdStatsHTML='<div class="hrow"><div class="hrl" style="opacity:.7">Inversión histórica no cargada</div>'+
        '<div><button class="btn btn-sm" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:white" onclick="Nav.go(\'config\',true)">Cargar en Config</button></div></div>';
    }

    // Categorías
    var catsHTML='';
    if(cats.length===0){
      catsHTML='<div class="empty"><div class="empty-ic">📊</div><div class="empty-su">Sin categorías activas</div></div>';
    } else {
      cats.forEach(function(c){
        var t = cerrado && snap
          ? ((snap.cats||[]).find(function(sc){return sc.id===c.id;})||{total:0}).total
          : totalCat(pid,c.id);
        var pres=getPres(pid,c.id);
        var p2=ingreso>0?Math.min((t/ingreso)*100,100):0;
        var presHtml='';
        if(pres>0){
          var presPct=(t/pres)*100;
          var presColor=presPct>=100?'var(--r600)':presPct>=80?'var(--y600)':'var(--g400)';
          presHtml='<div style="font-size:10px;color:'+presColor+';margin-top:2px">'+fmt(t)+' de '+fmt(pres)+' presupuestado</div>';
        }
        var catPaid=getCatPaid(pid,c.id);
        var payBtnCat=el('button',{
          class:'cat-pay-btn '+(catPaid?'paid':'unpaid'),
          onclick:'doToggleCatPaid(this,event)',
          'data-pid':pid,
          'data-cid':c.id
        },catPaid?'✓ Pagado':'○ Pendiente');
        catsHTML+='<div class="catrow">'+
          '<div class="catic" style="background:'+c.bg+'" data-cid="'+esc(c.id)+'" data-pid="'+pid+'" onclick="editCatMonto(this.dataset.pid,this.dataset.cid)">'+c.icon+'</div>'+
          '<div class="catbody" data-cid="'+esc(c.id)+'" data-pid="'+pid+'" onclick="editCatMonto(this.dataset.pid,this.dataset.cid)">'+
            '<div class="catname">'+(catPaid?'<s style="opacity:.5">':'')+esc(c.nombre)+(catPaid?'</s>':'')+' '+payBtnCat+'</div>'+
            presHtml+
            '<div class="catbar"><div class="catfill" style="width:'+p2+'%;background:'+c.color+'"></div></div>'+
          '</div>'+
          '<div style="text-align:right;flex-shrink:0">'+
            '<div style="font-family:var(--m);font-size:13px;font-weight:600;color:'+(catPaid?'var(--gr600)':'var(--r600)')+'">'+fmt(t)+'</div>'+
            (!cerrado?'<div style="font-size:12px;margin-top:2px;color:var(--g400)" data-cid="'+esc(c.id)+'" data-pid="'+pid+'" onclick="editCatMonto(this.dataset.pid,this.dataset.cid)">✏️</div>':'')+
          '</div>'+
        '</div>';
      });
    }

    // Alerta DEBIN
    var debinAlert='';
    if(debinPct>=80){
      var debinMsg=debinPct>100?'Límite superado':debinPct===100?'Límite alcanzado':'Cerca del límite';
      var debinCls=debinPct>=100?'al-d':'al-w';
      debinAlert='<div class="alert '+debinCls+'">'+
        '<span>⚠️</span><span><strong>DEBIN/MP:</strong> '+debinMsg+' ('+fmt(debinUsado)+' de '+fmt(debinLim)+')</span>'+
      '</div>';
    }

    // Gráfico evolución - preparar datos
    var chartData=[];
    var p3=PLAN_START;
    while(p3<=PLAN_END){
      var snap=getSnapshot(p3);
      // Usar RO: no crear períodos vacíos solo por el gráfico
      var perRO=getPeriodoRO(p3);
      var hasData=!!(S.periodos[p3]); // solo mostrar si el período realmente existe
      var gMonth=snap?snap.gastos:(hasData?totalGastos(p3):null);
      var iMonth=snap?snap.ingreso:(hasData?(+perRO.ingreso||INGRESO_DEF):null);
      var dispMonth=(gMonth!==null&&iMonth!==null)?iMonth-gMonth:null;
      chartData.push({pid:p3,label:pCortoMes(p3),gastos:gMonth,ingreso:iMonth,disp:dispMonth});
      p3=pNext(p3);
    }

    var closeBtnHTML=cerrado?
      '<div class="alert al-n" style="margin-top:12px"><span>🔒</span><span>Mes cerrado'+
        (getSnapshot(pid)&&getSnapshot(pid).cerradoEn?' el '+fmtDate(getSnapshot(pid).cerradoEn.slice(0,10)):'')+
        '. <button class="btn btn-sm btn-s" style="margin-left:8px" data-pid="'+pid+'" onclick="doReabrirMes(this)">Reabrir</button></span></div>'
      :
      '<div style="margin-top:12px">'+
        el('button',{class:'btn btn-sm btn-s btn-fw','data-pid':pid,onclick:'doAbrirCierre(this)'},'🔒 Cerrar '+pLabel(pid))+
      '</div>';

    var html='<div id="tc-banner-wrap"></div>'+
      // Hero ingreso
      '<div class="hero ind" style="margin-bottom:12px">'+
        '<div class="hl">Ingreso mensual · '+pLabel(pid)+'</div>'+
        '<div class="ha xl">'+fmt(ingreso)+'</div>'+
        '<div class="hs">Honorarios Gomatex'+(cerrado?' · <span style="background:rgba(255,255,255,.2);border-radius:999px;padding:2px 8px;font-size:11px">🔒 Cerrado</span>':'')+'</div>'+
        chipsHTML+
      '</div>'+
      // Métricas
      '<div class="metrics">'+
        '<div class="metric red"><div class="ml">Gastos del mes</div><div class="mv">'+fmtK(gastos)+'</div><div class="ms">'+pct.toFixed(0)+'% del ingreso</div></div>'+
        '<div class="metric '+(resto>=0?'grn':'red')+'"><div class="ml">Resto disponible</div><div class="mv">'+fmtK(Math.abs(resto))+'</div><div class="ms">'+(resto>=0?'Superávit':'⚠️ Déficit')+(ahorroMesARS>0?' · inc. USD':'')+'</div></div>'+
        (mostrarPorDia?'<div class="metric blu"><div class="ml">Por día</div><div class="mv">'+fmtK(porDia)+'</div><div class="ms">'+dRest+' días restantes</div></div>':'<div class="metric ind"><div class="ml">Por día</div><div class="mv" style="font-size:13px">Hist.</div><div class="ms">'+(cerrado?'Mes cerrado':'Mes pasado')+'</div></div>')+
        '<div class="metric '+(debinPct>100?'red':debinPct>=100?'red':debinPct>=80?'yel':'ind')+'"><div class="ml">DEBIN/MP</div><div class="mv">'+fmtK(debinUsado)+'</div><div class="ms">'+debinPct.toFixed(0)+'% de '+fmtK(debinLim)+'</div></div>'+
      '</div>'+
      debinAlert+
      // Hero USD
      '<div class="hero grn" style="margin-bottom:12px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
          '<div><div class="hl">USD Acumulados</div><div class="ha">'+fmtUSD(usdTotal)+'</div><div class="hs">TC hoy: '+fmt(S.tcActual)+
            ' · <button style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:2px 8px;color:white;font-size:11px;font-weight:600;cursor:pointer" onclick="TC.check()">TC ✏️</button>'+
          '</div></div>'+
        '</div>'+
        '<div class="hdiv"></div>'+
        usdStatsHTML+
        '<div style="margin-top:12px">'+
          '<div style="display:flex;justify-content:space-between;font-size:11px;opacity:.75;margin-bottom:4px"><span>Meta USD '+USD_META.toLocaleString()+' (Jun–Dic 2026)</span><span>'+usdPct+'%</span></div>'+
          '<div style="height:5px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden">'+
            '<div style="height:100%;width:'+Math.min(usdPct,100)+'%;background:white;border-radius:999px;transition:width .4s ease"></div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      // Categorías
      '<div class="card">'+
        '<div class="ch"><div class="ct" style="margin:0">Categorías</div>'+
          btn('btn btn-sm btn-s','Gestionar','Nav.go("config",true)')+
        '</div>'+
        '<div class="pw"><div class="pl"><span>Total gastos</span><span>'+fmt(gastos)+' / '+fmt(ingreso)+'</span></div>'+
          '<div class="pt"><div class="pf '+progClass(pct)+'" style="width:'+pct+'%"></div></div>'+
        '</div>'+
        catsHTML+
        closeBtnHTML+
      '</div>'+
      // Gráfico evolución (solo si hay datos)
      (chartData.some(function(d){return d.gastos>0;}) ?
        '<div class="card"><div class="ct">Evolución mensual</div>'+
          '<div class="chwrap"><canvas id="chart-evol"></canvas></div>'+
          '<div style="display:flex;gap:12px;justify-content:center;margin-top:8px;font-size:11px;color:var(--g500)">'+
            '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#3b82f6;display:inline-block;border-radius:2px"></span>Gastos</span>'+
            '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#22c55e;display:inline-block;border-radius:2px;opacity:.6"></span>Ingreso</span>'+
            '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#eab308;display:inline-block;border-radius:2px;opacity:.6"></span>Disponible</span>'+
          '</div>'+
        '</div>' : '')+
      // WhatsApp
      el('button',{class:'btn btn-fw',style:'background:#25D366;color:white;margin-bottom:12px;box-shadow:0 3px 10px rgba(37,211,102,.22)',onclick:'compartirWA("'+pid+'")'},'📱 Compartir por WhatsApp');

    // ── RESUMEN DE PAGOS (separado: fijos / variables / cuotas) ──
    // Gastos fijos: monto base de categoría (marcado con getCatPaid)
    var fijosPend=[], fijosPag=[];
    cats.forEach(function(c){
      var base=cerrado&&snap?((snap.cats||[]).find(function(sc){return sc.id===c.id;})||{total:0}).total:(+c.monto||0);
      if(base<=0)return;
      if(getCatPaid(pid,c.id))fijosPag.push({cat:c,monto:base});
      else fijosPend.push({cat:c,monto:base});
    });
    var totalFijoPend=fijosPend.reduce(function(a,x){return a+x.monto;},0);
    var totalFijoPag =fijosPag.reduce(function(a,x){return a+x.monto;},0);
    // Gastos variables: gastos cargados manualmente (isPaid individual)
    var gastosVar=getGastos(pid);
    var varPend=gastosVar.filter(function(g){return !g.isPaid;});
    var varPag =gastosVar.filter(function(g){return  g.isPaid;});
    var totalVarPend=varPend.reduce(function(a,g){return a+(+g.importe||0);},0);
    var totalVarPag =varPag.reduce(function(a,g) {return a+(+g.importe||0);},0);
    // Cuotas activas del mes
    var cuotasMes=[];
    Object.values(S.periodos).forEach(function(per){
      (per.cuotas||[]).forEach(function(cq){
        var dy=parseInt(cq.desde.split('-')[0]),dm=parseInt(cq.desde.split('-')[1]);
        var py=parseInt(pid.split('-')[0]),pm=parseInt(pid.split('-')[1]);
        var diff=(py-dy)*12+(pm-dm);
        if(diff>=0&&diff<(+cq.n)){
          var val=diff===0?((+cq.cuotaPrimera)||(+cq.cuotaVal)||0):(+cq.cuotaVal||0);
          cuotasMes.push({desc:cq.desc,val:val,cuota:diff+1,n:cq.n});
        }
      });
    });
    var totalCuotasMes=cuotasMes.reduce(function(a,x){return a+x.val;},0);

    if(cats.length>0||gastosVar.length>0){
      var pendHTML='';
      if(fijosPend.length>0){
        pendHTML+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--g400);margin:8px 0 4px">Fijos pendientes</div>';
        fijosPend.forEach(function(x){
          pendHTML+='<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--g100)">'+
            '<span>'+x.cat.icon+'</span>'+
            '<span style="flex:1;font-size:12px;color:var(--g700)">'+esc(x.cat.nombre)+'</span>'+
            '<span style="font-family:var(--m);font-size:12px;font-weight:600;color:var(--y600)">'+fmt(x.monto)+'</span>'+
          '</div>';
        });
      }
      if(varPend.length>0){

    var py=parseInt(pid.split('-')[0]),pm=parseInt(pid.split('-')[1]);
    var allCuotas=[];
    Object.values(S.periodos).forEach(function(p3){(p3.cuotas||[]).forEach(function(c){allCuotas.push(c);});});

    var catOpts='';
    cats.forEach(function(c){catOpts+='<option value="'+esc(c.id)+'">'+c.icon+' '+esc(c.nombre)+'</option>';});
    var desdeOpts='';
    var p3=pid;
    for(var i=0;i<24;i++){desdeOpts+='<option value="'+p3+'"'+(i===0?' selected':'')+'>'+pLabel(p3)+'</option>';p3=pNext(p3);}

    var cuotasListHTML='';
    if(allCuotas.length===0){
      cuotasListHTML='<div class="empty"><div class="empty-ic">💳</div><div class="empty-ti">Sin cuotas</div><div class="empty-su">Agregá tu primera compra arriba</div></div>';
    } else {
      allCuotas.forEach(function(c){
        var dy=parseInt(c.desde.split('-')[0]),dm=parseInt(c.desde.split('-')[1]);
        var diff=(py-dy)*12+(pm-dm);
        var activa=diff>=0&&diff<(+c.n);
        var terminada=diff>=(+c.n);
        var cuotaAct=diff>=0?diff+1:0;
        var estado=terminada?'✅ Terminada':activa?('Cuota '+cuotaAct+'/'+c.n):('⏳ Empieza '+pCortoMes(c.desde));
        var estColor=terminada?'var(--gr600)':activa?'var(--i600)':'var(--g400)';
        var catNom=(getCats(pid).find(function(ct){return ct.id===c.catId;})||{}).nombre||c.catId;
        // Pastillas de meses
        var pastillas='';
        for(var j=0;j<c.n;j++){
          var mp=c.desde;for(var k=0;k<j;k++)mp=pNext(mp);
          var esCur=mp===pid,esPast=mp<pid;
          var pbg=esCur?'var(--i600)':esPast?'var(--gr50)':'var(--i50)';
          var pcol=esCur?'white':esPast?'var(--gr600)':'var(--i500)';
          var pbrd=esCur?'var(--i600)':esPast?'var(--gr200)':'var(--i200)';
          pastillas+='<div class="cmth" style="background:'+pbg+';color:'+pcol+';border-color:'+pbrd+'">'+pCortoMes(mp)+'</div>';
        }
        cuotasListHTML+='<div style="padding:13px 0;border-bottom:1px solid var(--g100)">'+
          '<div style="display:flex;align-items:flex-start;gap:10px">'+
            '<div style="width:38px;height:38px;border-radius:11px;background:'+(terminada?'var(--gr50)':activa?'var(--i50)':'var(--g100)')+';display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">💳</div>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:13px;font-weight:700;color:var(--g900)">'+esc(c.desc)+'</div>'+
              '<div style="font-size:11px;color:var(--g400);margin-bottom:5px">'+esc(catNom)+' · <span style="color:'+estColor+';font-weight:600">'+estado+'</span></div>'+
              '<div class="cmths">'+pastillas+'</div>'+
            '</div>'+
            '<div style="text-align:right;flex-shrink:0">'+
              '<div style="font-family:var(--m);font-size:13px;font-weight:700;color:var(--r600)">'+fmt(c.cuotaVal)+'/mes</div>'+
              '<div style="font-size:11px;color:var(--g400)">Total: '+fmt(c.total)+'</div>'+
              el('button',{class:'bic dl',style:'margin-top:5px;margin-left:auto',onclick:'doCuotaDel(this)','data-id':c.id},'✕')+
            '</div>'+
          '</div>'+
        '</div>';
      });
    }

    document.getElementById('g-cuotas').innerHTML=
      '<div class="card"><div class="ct">Nueva compra en cuotas sin interés</div>'+
        '<div class="fg"><label>Descripción</label><input type="text" class="fi" id="cq-desc" placeholder="ej: Zapatillas, TV..."><div class="ferr" id="cq-desc-err"></div></div>'+
        '<div class="fgrid">'+
          '<div class="fg"><label>Monto total $</label><input type="text" inputmode="decimal" class="fi" id="cq-total" placeholder="0" oninput="CUI.preview()"><div class="ferr" id="cq-total-err"></div></div>'+
          '<div class="fg"><label>Cant. cuotas</label><input type="number" class="fi" id="cq-n" placeholder="3" min="1" max="60" oninput="CUI.preview()"><div class="ferr" id="cq-n-err"></div></div>'+
        '</div>'+
        '<div class="fgrid">'+
          '<div class="fg"><label>Categoría / tarjeta</label><select class="fs" id="cq-cat">'+catOpts+'</select></div>'+
          '<div class="fg"><label>Primer débito</label><select class="fs" id="cq-desde" onchange="CUI.preview()">'+desdeOpts+'</select></div>'+
        '</div>'+
        '<div id="cq-preview"></div>'+
        '<div class="brow">'+btn('btn btn-p btn-fw','Agregar cuota','CUI.agregar()')+'</div>'+
      '</div>'+
      '<div class="card"><div class="ch"><div class="ct" style="margin:0">Cuotas activas</div><span style="font-size:12px;color:var(--g400)">'+allCuotas.length+' total</span></div>'+
        cuotasListHTML+
      '</div>';
  },
  renderLista:function(){
    this._pid=this._pid||S.periodoActual;
    var pid=this._pid,cats=getCats(pid);

    if(this._busq){var b=this._busq.toLowerCase();gastos=gastos.filter(function(g){return ((g.desc||'').toLowerCase()+' '+(g.obs||'').toLowerCase()).indexOf(b)>=0;});}
    gastos.reverse();
    var total=gastos.reduce(function(a,g){return a+(+g.importe||0);},0);
    var esCurPid=pid===S.periodoActual;

    // Pills
    var pills='',p3=S.periodoActual;
    var startP=pPrev(pPrev(p3));
    for(var i=0;i<14;i++){
      pills+=el('button',{class:'mpill'+(startP===pid?' active':''),onclick:'doSetPid(this)','data-pid':startP},pCorto(startP));

      listHTML='<div class="empty"><div class="empty-ic">📝</div><div class="empty-ti">Sin gastos</div><div class="empty-su">Cargá desde + Nuevo</div></div>';
    } else {
      gastos.forEach(function(g){
        var cat=cats.find(function(c){return c.id===g.catId;})||{icon:'📦',nombre:'Otros',color:'#6b7280'};
        var gPaid=!!(g.isPaid);
        var payGastoBtn=el('button',{
          class:'pay-btn '+(gPaid?'paid':'unpaid'),
          onclick:'doToggleGastoPaid(this,event)',
          'data-id':g.id,
          'data-pid':pid,
          title:'Marcar como pagado / pendiente'
        },gPaid?'✓ Pagado':'○ Pendiente');
        listHTML+='<div class="litem'+(gPaid?' paid-item':'')+'">'+
          '<div style="width:9px;height:9px;border-radius:50%;background:'+cat.color+';flex-shrink:0;margin-top:4px"></div>'+
          '<div class="litem-body">'+
            '<div class="litem-name">'+(gPaid?'<span style="text-decoration:line-through;opacity:.6">':'')+esc(g.desc||cat.nombre)+(gPaid?'</span>':'')+' '+payGastoBtn+'</div>'+
            '<div class="litem-meta">'+fmtDate(g.fecha)+' · '+cat.icon+' '+esc(cat.nombre)+(g.obs?' · '+esc(g.obs):'')+'</div>'+
          '</div>'+
          '<div class="lamt" style="color:'+(gPaid?'var(--gr600)':'var(--r600)')+'">-'+fmt(g.importe)+'</div>'+
          '<div class="lact">'+
            el('button',{class:'bic ed',onclick:'doGastoEdit(this)','data-id':g.id,'data-pid':pid},'✏️')+
            (esCurPid?el('button',{class:'bic dl',onclick:'doGastoDel(this)','data-id':g.id,'data-pid':pid},'✕'):'')+
          '</div>'+
        '</div>';
      });
    }

    document.getElementById('g-lista').innerHTML=
      '<div class="mpills">'+pills+'</div>'+
      '<div class="swrap"><span class="sico">🔍</span><input class="sfi" placeholder="Buscar..." value="'+esc(this._busq)+'" oninput="GUI._busq=this.value;GUI.renderLista()" aria-label="Buscar gasto"></div>'+
      '<div class="fg"><select class="fs" onchange="GUI._filtroCat=this.value;GUI.renderLista()" aria-label="Filtrar por categoría">'+catOpts2+'</select></div>'+
      '<div class="card">'+
        '<div class="ch"><div class="ct" style="margin:0">'+gastos.length+' gasto'+(gastos.length!==1?'s':'')+' · '+pLabel(pid)+'</div>'+
          '<span style="font-family:var(--m);font-size:13px;font-weight:600;color:var(--r600)">'+fmt(total)+'</span></div>'+
        listHTML+
      '</div>';
  },
  setPid:function(pid){this._pid=pid;this.renderLista();}
};

// ── GASTOS ──
var Gastos={
  agregar:function(){
    var fecha=document.getElementById('g-fecha').value||localToday();
    var importe=document.getElementById('g-imp').value;
    var catId=document.getElementById('g-cat').value;
    var desc=(document.getElementById('g-desc').value||'').trim();
    var obs=(document.getElementById('g-obs').value||'').trim();
    var ok=true;
    var errI=validarAR(importe,'Importe');showErr('g-imp-err',errI);if(errI)ok=false;
    if(!catId){showErr('g-cat-err','Seleccioná una categoría');ok=false;}else showErr('g-cat-err',null);
    if(!ok)return;
    var pid=pFromDate(fecha)||S.periodoActual;
    if(esCerrado(pid)){alert('El período '+pLabel(pid)+' está cerrado. Reabrilo desde Config para agregar gastos.');return;}
    getPeriodo(pid).gastos.push({id:uid('g'),fecha:fecha,catId:catId,importe:parseAR(importe),desc:desc,obs:obs});
    save();Render.all();GUI.renderNuevo();
    document.getElementById('g-imp').value='';
    document.getElementById('g-desc').value='';
    document.getElementById('g-obs').value='';
  },
  editar:function(id,pid){
    var per=getPeriodo(pid);
    var g=per.gastos.find(function(x){return x.id===id;});if(!g)return;
    var cats=getCats(pid).filter(function(c){return c.activa;});
    var opts='';cats.forEach(function(c){opts+='<option value="'+esc(c.id)+'"'+(c.id===g.catId?' selected':'')+'>'+c.icon+' '+esc(c.nombre)+'</option>';});
    openModal(
      '<div class="mtitle">Editar gasto</div>'+
      '<div class="fgrid"><div class="fg"><label>Fecha</label><input type="date" class="fi" id="eg-fecha" value="'+g.fecha+'"></div>'+
        '<div class="fg"><label>Importe $</label><input type="text" inputmode="decimal" class="fi" id="eg-imp" value="'+g.importe+'"><div class="ferr" id="eg-imp-err"></div></div></div>'+
      '<div class="fg"><label>Categoría</label><select class="fs" id="eg-cat">'+opts+'</select></div>'+
      '<div class="fg"><label>Descripción</label><input type="text" class="fi" id="eg-desc" value="'+esc(g.desc||'')+'"></div>'+
      '<div class="fg"><label>Observación</label><textarea class="ft" id="eg-obs">'+esc(g.obs||'')+'</textarea></div>'+
      '<div class="brow">'+el('button',{class:'btn btn-p btn-fw',onclick:'Gastos._save("'+id+'","'+pid+'")'}, 'Guardar cambios')+'</div>',
      function(){var e=document.getElementById('eg-imp');if(e)e.focus();}
    );
  },
  _save:function(id,pid){
    var importe=document.getElementById('eg-imp').value;
    var errI=validarAR(importe,'Importe');showErr('eg-imp-err',errI);if(errI)return;
    var per=getPeriodo(pid);
    var g=per.gastos.find(function(x){return x.id===id;});if(!g)return;
    var fecha=document.getElementById('eg-fecha').value||g.fecha;
    var np=pFromDate(fecha)||pid;
    if(esCerrado(pid)){alert('El período '+pLabel(pid)+' está cerrado. Reabrilo para editar.');return;}
    if(np!==pid&&esCerrado(np)){alert('El período destino '+pLabel(np)+' está cerrado. No se puede mover el gasto.');return;}
    var upd={id:id,fecha:fecha,catId:document.getElementById('eg-cat').value,importe:parseAR(importe),
             desc:(document.getElementById('eg-desc').value||'').trim(),obs:(document.getElementById('eg-obs').value||'').trim(),
             isPaid:g.isPaid||false}; // preservar isPaid al editar
    if(np!==pid){per.gastos=per.gastos.filter(function(x){return x.id!==id;});getPeriodo(np).gastos.push(upd);}
    else Object.assign(g,upd);
    save();closeModal();Render.all();GUI.renderLista();
  },
  eliminar:function(id,pid){
    if(esCerrado(pid)){alert('El período '+pLabel(pid)+' está cerrado. Reabrilo para eliminar gastos.');return;}
    if(!confirm('¿Eliminar este gasto?'))return;
    var per=getPeriodo(pid);per.gastos=per.gastos.filter(function(g){return g.id!==id;});
    save();Render.all();GUI.renderLista();
  }
};

// ── CUOTAS UI ──
var CUI={
  preview:function(){
    var totalV=document.getElementById('cq-total').value;
    var n=parseInt(document.getElementById('cq-n').value)||0;
    var desde=document.getElementById('cq-desde').value||S.periodoActual;
    var prev=document.getElementById('cq-preview');if(!prev)return;
    var t=parseAR(totalV);
    if(!t||!n){prev.innerHTML='';return;}
    var base=Math.floor(t/n),resto=t-(base*n);
    var rows=[];
    var p3=desde;
    for(var i=0;i<n;i++){
      var val=i===0?base+resto:base;
      var bg=i===0&&resto>0?'var(--y50)':'var(--b50)';
      var col=i===0&&resto>0?'var(--y600)':'var(--b600)';
      var brd=i===0&&resto>0?'var(--y100)':'var(--b100)';
      rows.push('<span style="display:inline-block;margin:2px;padding:2px 8px;border-radius:999px;background:'+bg+';color:'+col+';font-size:10px;font-weight:700;border:1px solid '+brd+'">'+pCortoMes(p3)+': '+fmt(val)+'</span>');
      p3=pNext(p3);
    }
    var nota=resto>0?' (1ra cuota: '+fmt(base+resto)+')':'';
    var extNote=n>6?'<div style="color:var(--y600);font-size:11px;margin-top:3px">⚠️ Cuotas que superan diciembre 2026 se proyectan en historial general</div>':'';
    prev.innerHTML='<div class="alert al-i" style="margin-top:8px"><span>📋</span><div><strong>'+fmt(base)+'/mes</strong> ('+n+' meses)'+nota+extNote+'<div style="margin-top:5px">'+rows.join('')+'</div></div></div>';
  },
  agregar:function(){
    var desc=(document.getElementById('cq-desc').value||'').trim();
    var totalV=document.getElementById('cq-total').value;
    var n=parseInt(document.getElementById('cq-n').value)||0;
    var catId=document.getElementById('cq-cat').value;
    var desde=document.getElementById('cq-desde').value||S.periodoActual;
    var ok=true;
    if(!desc){showErr('cq-desc-err','Ingresá una descripción');ok=false;}else showErr('cq-desc-err',null);
    var errT=validarAR(totalV,'Monto total');showErr('cq-total-err',errT);if(errT)ok=false;
    if(!n||n<1||n>60){showErr('cq-n-err','Entre 1 y 60 cuotas');ok=false;}else showErr('cq-n-err',null);
    if(!ok)return;
    var t=parseAR(totalV),base=Math.floor(t/n),resto=t-(base*n);
    if(esCerrado(desde)){alert('El período '+pLabel(desde)+' está cerrado. No se puede agregar cuotas que impacten ese mes.');return;}
    getPeriodo(desde).cuotas.push({id:uid('cq'),desc:desc,catId:catId,total:t,n:n,cuotaVal:base,cuotaPrimera:base+resto,desde:desde,alta:localToday()});
    save();Render.all();GUI.renderCuotas();
    document.getElementById('cq-desc').value='';
    document.getElementById('cq-total').value='';
    document.getElementById('cq-n').value='';
    document.getElementById('cq-preview').innerHTML='';
  },
  eliminar:function(id){
    if(!confirm('¿Eliminar esta cuota?'))return;
    Object.values(S.periodos).forEach(function(p3){p3.cuotas=(p3.cuotas||[]).filter(function(c){return c.id!==id;});});
    save();Render.all();GUI.renderCuotas();
  }
};

  var a=document.getElementById('a-ars');

      '<div class="fg"><label>Nombre</label><input type="text" class="fi" id="nc-nom" placeholder="ej: Alquiler, Comida..."><div class="ferr" id="nc-nom-err"></div></div>'+
      '<div class="fgrid">'+
        '<div class="fg"><label>Ícono</label><input type="text" class="fi" id="nc-icon" value="📦" style="font-size:20px;text-align:center"></div>'+
        '<div class="fg"><label>Monto fijo $</label><input type="text" inputmode="decimal" class="fi" id="nc-monto" value="0"><div class="ferr" id="nc-monto-err"></div></div>'+
      '</div>'+
      '<div class="brow">'+btn('btn btn-p btn-fw','Crear','Cfg._createCat()')+'</div>'
    );
  },
  _createCat:function(){
    var nom=(document.getElementById('nc-nom').value||'').trim();
    if(!nom){showErr('nc-nom-err','Ingresá un nombre');return;}
    var montoV=document.getElementById('nc-monto').value;
    var errM=validarAR(montoV,'Monto',{allowZero:true});showErr('nc-monto-err',errM);if(errM)return;
    var cats=getCats(S.periodoActual);
    var colors=['#6366f1','#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#06b6d4'];
    var iconV=(document.getElementById('nc-icon').value||'📦').trim();
    cats.push({id:uid('cat'),nombre:nom,icon:iconV,color:colors[cats.length%colors.length],bg:'#f9fafb',monto:parseAR(montoV)||0,activa:true,orden:cats.length});
    save();closeModal();Render.config();Render.inicio();
  },
  copiarAnterior:function(){
    var pid=S.periodoActual,ant=pPrev(pid);
    if(!S.periodos[ant]){alert('El mes anterior no tiene datos');return;}
    if(!confirm('¿Copiar categorías e ingreso de '+pLabel(ant)+' a '+pLabel(pid)+'?'))return;
    getPeriodo(pid).categorias=S.periodos[ant].categorias.map(function(c){return Object.assign({},c);});
    getPeriodo(pid).ingreso=S.periodos[ant].ingreso;
    save();Render.config();Render.inicio();
  }
};

// ── EDITAR MONTO CATEGORÍA DESDE INICIO ──
function editCatMonto(pid,catId){
  if(esCerrado(pid))return;
  var cat=getCats(pid).find(function(c){return c.id===catId;});if(!cat)return;
  openModal(
    '<div class="mtitle">'+cat.icon+' '+esc(cat.nombre)+'</div>'+
    '<div class="fg"><label>Monto fijo mensual ($)</label>'+
      '<input type="text" inputmode="decimal" class="fi" id="ecm-v" value="'+(cat.monto||0)+'" style="font-size:20px;text-align:center;font-family:var(--m)">'+
      '<div class="ferr" id="ecm-err"></div></div>'+
    '<div class="fg"><label>Presupuesto máximo ($) — opcional</label>'+
      '<input type="text" inputmode="decimal" class="fi" id="ecm-pres" value="'+(getPres(pid,catId)||'')+'" placeholder="Sin tope">'+
    '</div>'+
    '<div class="brow">'+el('button',{class:'btn btn-p btn-fw',onclick:'saveMontoYPres("'+pid+'","'+catId+'")'}, 'Guardar')+'</div>',
    function(){var e=document.getElementById('ecm-v');if(e){e.focus();e.select();}}
  );
}
window.saveMontoYPres=function(pid,catId){
  if(esCerrado(pid)){alert('El período '+pLabel(pid)+' está cerrado. Reabrilo para cambiar montos.');closeModal();return;}
  var v=document.getElementById('ecm-v').value;
  var err=validarAR(v,'Monto',{allowZero:true});showErr('ecm-err',err);if(err)return;
  var presV=document.getElementById('ecm-pres').value;
  var cat=getCats(pid).find(function(c){return c.id===catId;});if(!cat)return;
  cat.monto=parseAR(v)||0;
  var presN=parseAR(presV);
  if(presN&&presN>0)setPres(pid,catId,presN);
  else if(S.presupuestos[pid])delete S.presupuestos[pid][catId];
  save();closeModal();Render.inicio();
};

// ── EXPORTAR ──
var Exportar={
  excel:function(pid){
    var per=getPeriodoRO(pid);
    var cerrado=esCerrado(pid);
    var snap=getSnapshot(pid);
    var cats=getCats(pid).filter(function(c){return c.activa;});
    var wb=XLSX.utils.book_new();

    // ── Hoja Resumen ──
    var ingreso=cerrado&&snap?snap.ingreso:getIngreso(pid);
    var gastos=cerrado&&snap?snap.gastos:totalGastos(pid);
    var resumenData=[
      ['FM Capital — '+pLabel(pid),'',''],
      ['Estado mes',cerrado?'CERRADO':'Abierto',''],
      cerrado&&snap?['Fecha de cierre',fmtDate(snap.cerradoEn.slice(0,10)),'']:null,
      [''],
      ['Ingreso mensual',ingreso,''],
      ['Total gastos',gastos,''],
      ['Resto disponible',ingreso-gastos,''],
      [''],
      ['USD total',totalUSD(),''],
      ['TC actual',S.tcActual,''],
      ['Valor actual USD',valorActual(),''],
    ].filter(Boolean);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(resumenData),'Resumen');

    // ── Hoja Categorías (fijos) ──
    var catsData=[['Categoría','Monto fijo','Gastos var.','Cuotas','Total','Presupuesto','Estado pago']];
    cats.forEach(function(c){
      var base=c.monto||0;
      var gVar=(per.gastos||[]).filter(function(g){return g.catId===c.id;}).reduce(function(a,g){return a+(+g.importe||0);},0);
      var cuotas=cuotasActivasMes(pid,c.id);
      var total=cerrado&&snap?((snap.cats||[]).find(function(sc){return sc.id===c.id;})||{total:0}).total:(base+gVar+cuotas);
      var pres=getPres(pid,c.id);
      var paid=getCatPaid(pid,c.id);
      catsData.push([c.nombre,base,gVar,cuotas,total,pres||'',paid?'Pagado':'Pendiente']);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(catsData),'Categorías');

    // ── Hoja Gastos variables ──
    var gastosData=[['Fecha','Categoría','Importe','Descripción','Observación','Estado pago']];
    (per.gastos||[]).forEach(function(g){
      var cat=cats.find(function(c){return c.id===g.catId;});
      gastosData.push([g.fecha,cat?cat.nombre:g.catId,g.importe,g.desc||'',g.obs||'',g.isPaid?'Pagado':'Pendiente']);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(gastosData),'Gastos');

    // ── Hoja Cuotas ──
    var cuotasData=[['Descripción','Categoría','Cuota','Total','Val. mes','Desde']];
    Object.values(S.periodos).forEach(function(p3){
      (p3.cuotas||[]).forEach(function(cq){
        var dy=parseInt(cq.desde.split('-')[0]),dm=parseInt(cq.desde.split('-')[1]);
        var py=parseInt(pid.split('-')[0]),pm=parseInt(pid.split('-')[1]);
        var diff=(py-dy)*12+(pm-dm);
        if(diff>=0&&diff<(+cq.n)){
          var val=diff===0?((+cq.cuotaPrimera)||(+cq.cuotaVal)||0):(+cq.cuotaVal||0);
          var cat=cats.find(function(c){return c.id===cq.catId;});
          cuotasData.push([cq.desc,cat?cat.nombre:cq.catId,(diff+1)+'/'+cq.n,cq.total,val,cq.desde]);
        }
      });
    });
    if(cuotasData.length>1) XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cuotasData),'Cuotas');

    // ── Hoja USD ──
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(
      [['Fecha','USD','TC','ARS']].concat(S.ahorros.map(function(h){return[h.fecha,h.usd,h.tc,h.ars];}))
    ),'USD');

    XLSX.writeFile(wb,'FM_Capital_'+pid+'.xlsx');
  }
};
function compartirWA(pid){
  var cats=getCats(pid).filter(function(c){return c.activa;});
  var t='*Resumen FM Capital — '+pLabel(pid)+'*\n\n';
  t+='💰 *Ingreso:* '+fmt(getIngreso(pid))+'\n\n📊 *Gastos:*\n';
  cats.forEach(function(c){
    var v=totalCat(pid,c.id);
    if(v>0)t+=c.icon+' '+c.nombre+': '+fmt(v)+(getCatPaid(pid,c.id)?' ✅':' ⏳')+'\n';
  });
  t+='\n*Total:* '+fmt(totalGastos(pid))+'\n\n💵 *Ahorro USD:*\nUSD '+totalUSD().toLocaleString()+' @ TC '+fmt(S.tcActual)+'\nValor actual: '+fmt(valorActual())+'\n';
  var gan=gananciaLatente();if(gan!==null)t+='Ganancia: '+(gan>=0?'+':'')+fmt(gan)+'\n';
  t+='\n💚 *Disponible:* '+fmt(getIngreso(pid)-totalGastos(pid));
  window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');
}

// ── INIT ──
(function initApp(){
  // 1. Cargar localStorage sincrónicamente para render inmediato (sin flash vacío)
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(raw){var local=JSON.parse(raw);migrate(local);Object.assign(S,local);}
  }catch(e){}
  getPeriodo(S.periodoActual);
  document.getElementById('period-badge').textContent=pCorto(S.periodoActual);
  Render.inicio(); // render inmediato con datos locales

  // 2. Cargar desde Supabase y re-renderizar si hay datos más recientes
  Cloud.load().then(function(){
    getPeriodo(S.periodoActual);
    document.getElementById('period-badge').textContent=pCorto(S.periodoActual);
    Render.all();
  }).catch(function(e){
    console.warn('[initApp] Cloud.load error:', e);
    // Ya tiene datos del localStorage — app funciona igualmente
  });

  // 3. Flush periódico cada 3 minutos como seguro adicional
  setInterval(function(){
    if(document.visibilityState==='visible'){
      Cloud.forceSync();
    }
  }, 3*60*1000);

  // 4. Flush inmediato cuando el usuario va a cerrar/salir
  window.addEventListener('visibilitychange', function(){
    if(document.visibilityState==='hidden'){
      // Usar sendBeacon si está disponible para garantizar el envío
      var sb=window.FM_SB_URL;
      if(sb && sb.indexOf('TU_')<0){
        // Flush urgente antes de cerrar
        Cloud.forceSync();
      }
    }
  });

  window.addEventListener('beforeunload', function(){
    // Último save sincrónico en localStorage antes de cerrar
    try{
      var payload=cloneState();
      payload.clientUpdatedAt=new Date().toISOString();
      localStorage.setItem(LS_KEY, JSON.stringify(payload));
    }catch(e){}
  });
})();
</script>
